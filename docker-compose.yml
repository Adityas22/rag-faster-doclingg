version: "3.9"

services:
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ai_course_fastapi
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - redis
      - qdrant
    volumes:
      - shared_temp:/app/temp
      - shared_output:/app/output
      - ./app:/app/app # ← mount code lokal, edit file = langsung berlaku
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  docling_worker:
    build:
      context: .
      dockerfile: Dockerfile.docling
    container_name: ai_course_docling_worker
    command: >
      celery -A app.workers.celery_app worker
      -Q document --loglevel=info --concurrency=1 -n docling@%h
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DOCLING_OCR_ENABLED=true
      - DOCLING_TABLE_STRUCTURE=true
      - HF_HUB_DISABLE_SYMLINKS_WARNING=1
      - HF_HUB_CACHE=/root/.cache/huggingface
      - HUGGINGFACE_HUB_CACHE=/root/.cache/huggingface
    depends_on:
      - redis
      - qdrant
    volumes:
      - shared_temp:/app/temp
      - shared_output:/app/output
      - docling_models:/root/.cache
      - ./app:/app/app # ← mount code lokal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

  whisper_worker:
    build:
      context: .
      dockerfile: Dockerfile.whisper
    container_name: ai_course_whisper_worker
    command: >
      celery -A app.workers.celery_app worker
      -Q audio --loglevel=info --concurrency=2 -n whisper@%h
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - WHISPER_KEEP_IN_MEMORY=true
    depends_on:
      - redis
      - qdrant
    volumes:
      - shared_temp:/app/temp
      - whisper_models:/root/.cache/huggingface
      - ./app:/app/app # ← mount code lokal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 3G

  celery_generate:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ai_course_celery_generate
    command: >
      celery -A app.workers.celery_app worker
      -Q generate --loglevel=info --concurrency=2 -n generate@%h
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - redis
      - qdrant
      - ollama
    volumes:
      - ./app:/app/app # ← mount code lokal
    restart: unless-stopped

  flower:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ai_course_flower
    command: celery -A app.workers.celery_app flower --port=5555 --basic_auth=admin:admin123
    ports:
      - "5555:5555"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - ./app:/app/app # ← mount code lokal
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ai_course_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai_course_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ai_course_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    entrypoint:
      [
        "/bin/sh",
        "-c",
        "ollama serve & sleep 8 && ollama pull llama3.2 && wait",
      ]

volumes:
  redis_data:
  qdrant_data:
  ollama_data:
  shared_temp:
  shared_output:
  docling_models:
  whisper_models:
